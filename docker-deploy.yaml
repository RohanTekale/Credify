version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: credify_django_app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: credify.settings
      REDIS_URL: redis://cache:6379/0
    # ports:
    #   - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - cache
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py create_superuser &&
             gunicorn credify.wsgi:application --bind 0.0.0.0:8000"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 512M

  cache:
    image: redis:7
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.10'
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
  
  db:
    image: postgres:14
    container_name: credify_postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 512M
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    depends_on:
      - web

  metabase:
    image: metabase/metabase:latest
    container_name: credify_metabase
    env_file:
      - .env
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=${POSTGRES_DB}
      - MB_DB_PORT=5432
      - MB_DB_USER=${POSTGRES_USER}
      - MB_DB_PASS=${POSTGRES_PASSWORD}
      - MB_DB_HOST=db
      - MB_ADMIN_EMAIL=admin@credify.com
      - MB_ADMIN_PASSWORD=securepassword123
      - MB_SETUP_TOKEN=skip
    depends_on:
      - db
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 512M




volumes:
  postgres_data:
  metabase_data:


