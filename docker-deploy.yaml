version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: credify_django_app
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: credify.settings
      REDIS_URL: redis://cache:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - cache
      - db
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py create_superuser &&
             gunicorn credify.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    restart: always
    networks:
      - credify-net

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    image: credify_django_app
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: credify.settings
      REDIS_URL: redis://cache:6379/0
    command: celery -A credify worker -l info
    depends_on:
      - cache
      - db
      - web
    restart: always
    networks:
      - credify-net

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    image: credify_django_app
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: credify.settings
      REDIS_URL: redis://cache:6379/0
    command: celery -A credify beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - cache
      - db
      - web
    restart: always
    networks:
      - credify-net

  cache:
    image: redis:7
    ports:
      - "6379:6379"
    restart: always
    networks:
      - credify-net

  db:
    image: postgres:14
    container_name: credify_postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - credify-net

  nginx:
    image: nginx:latest
    container_name: credify-backend-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    depends_on:
      - web
    restart: always
    networks:
      - credify-net

volumes:
  postgres_data:

networks:
  credify-net:
    name: credify-net
    driver: bridge