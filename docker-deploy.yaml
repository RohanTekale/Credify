
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: credify_django_app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: credify.settings
      REDIS_URL: redis://cache:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - cache
      - db
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn credify.wsgi:application --bind 0.0.0.0:8000"
    restart: always

  cache:
    image: redis:7
    ports:
      - "6379:6379"
    restart: always

  db:
    image: postgres:14
    container_name: credify_postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    depends_on:
      - web
    restart: always

  metabase:
    image: metabase/metabase:latest
    container_name: credify_metabase
    env_file:
      - .env
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=${POSTGRES_DB}
      - MB_DB_PORT=5432
      - MB_DB_USER=${POSTGRES_USER}
      - MB_DB_PASS=${POSTGRES_PASSWORD}
      - MB_DB_HOST=db
      - MB_ADMIN_EMAIL=admin@credify.com
      - MB_ADMIN_PASSWORD=securepassword123
      - MB_SETUP_TOKEN=skip
    depends_on:
      - db
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    restart: always

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: credify.settings
      REDIS_URL: redis://cache:6379/0
    command: celery -A credify worker -l info
    depends_on:
      - cache
      - db
    restart: always

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: credify.settings
      REDIS_URL: redis://cache:6379/0
    command: celery -A credify beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - cache
      - db
    restart: always

volumes:
  postgres_data:
  metabase_data: